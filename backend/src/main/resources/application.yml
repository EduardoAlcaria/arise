spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/automation_db
    username: automation_user
    password: automation_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: automation
    password: automation
    listener:
      simple:
        # A message that errors before our listener's own try/catch (e.g. unconvertible
        # payload) is discarded instead of being requeued forever. Normal deploy failures
        # are caught and self-fail; unacked-on-restart redelivery is a separate path.
        default-requeue-rejected: false
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100
      thread-name-prefix: async-
    scheduling:
      pool:
        size: 2

jwt:
  secret: ${JWT_SECRET:YXV0b21hdGlvbmNlbnRlci1qd3Qtc2VjcmV0LWtleS0zMis=}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

encryption:
  secret: ${ENCRYPTION_SECRET:change-me-in-production-use-32-chars}

ssh:
  command-timeout-seconds: ${SSH_COMMAND_TIMEOUT_SECONDS:120}
  long-command-timeout-seconds: ${SSH_LONG_COMMAND_TIMEOUT_SECONDS:1800}
  ping-timeout-seconds: ${SSH_PING_TIMEOUT_SECONDS:10}

backup:
  directory: ${BACKUP_DIRECTORY:/backups}
  # Daily at 03:00 server time
  cron: ${BACKUP_CRON:0 0 3 * * *}
  retention-count: ${BACKUP_RETENTION_COUNT:7}

logging:
  level:
    com.automationcenter: DEBUG
    org.springframework.security: INFO
